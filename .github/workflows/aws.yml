name: Deploy to AWS App Runner

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: experienceday/robot_controller
  APP_RUNNER_SERVICE_NAME: experienceday-robot-controller
  APP_RUNNER_PORT: "8000"

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy to App Runner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          # also push latest so App Runner can track a stable tag if desired
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> "$GITHUB_OUTPUT"

      - name: Create or update App Runner service
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          APP_RUNNER_ACCESS_ROLE_ARN: ${{ secrets.APP_RUNNER_ACCESS_ROLE_ARN }}
        run: |
          set -euo pipefail

          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE_NAME'].ServiceArn | [0]" \
            --output text)

          if [ "$SERVICE_ARN" = "None" ] || [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service: $APP_RUNNER_SERVICE_NAME"

            aws apprunner create-service \
              --service-name "$APP_RUNNER_SERVICE_NAME" \
              --source-configuration "{
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"$APP_RUNNER_ACCESS_ROLE_ARN\"
                },
                \"AutoDeploymentsEnabled\": true,
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"$APP_RUNNER_PORT\"
                  }
                }
              }"

          else
            echo "App Runner service exists: $SERVICE_ARN"
            echo "Triggering deployment"

            aws apprunner start-deployment \
              --service-arn "$SERVICE_ARN"
          fi
