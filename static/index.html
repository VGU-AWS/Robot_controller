<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Controller UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Robot Controller</h1>
      <button id="logoutBtn" class="ghost">Logout</button>
    </header>

    <main class="container">
      <section id="page-landing" class="page card">
        <h2>Welcome</h2>
        <p class="subtitle">Register to start controlling an available robot.</p>
        <label>
          Your name
          <input id="registerName" type="text" placeholder="Alice" />
        </label>
        <div class="actions">
          <button id="registerBtn">Register</button>
        </div>
      </section>

      <section id="page-robots" class="page card hidden">
        <h2>Find Robot</h2>
        <p class="subtitle">Check free robots and connect one to your account.</p>
        <div class="info-grid">
          <div><span class="label">User</span><span id="userInfo">-</span></div>
          <div><span class="label">Connected Robot</span><span id="connectedRobotInfo">None</span></div>
          <div><span class="label">Available Robots</span><span id="availableCount">-</span></div>
        </div>
        <div class="actions">
          <button id="refreshRobotsBtn" class="ghost">Refresh Available Robots</button>
          <button id="connectRobotBtn">Connect Free Robot</button>
        </div>
      </section>

      <section id="page-commands" class="page card hidden">
        <h2>Send Command</h2>
        <p class="subtitle">Use the control buttons to send movement instructions.</p>
        <div id="commandButtons" class="command-grid"></div>
        <div class="actions top-gap">
          <button id="releaseRobotBtn" class="danger">Free Robot</button>
        </div>
      </section>

      <section class="card output-wrap">
        <h2>Response</h2>
        <pre id="output">Ready.</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
